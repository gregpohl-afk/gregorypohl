    <!-- Collected. Only the photo window and plaque are replaced, preserving the original frames. -->
    <button class="collected-artifact collected-1" data-collected="laurel" type="button" aria-label="Laurel Canyon, Los Angeles, California, March 12, 2015">
      <span class="artifact-story">We lived in the same apartment as Jim Morrison, so we’d routinely wake up to find tourists taking pictures of our front door.</span>
    </button>
    <button class="collected-artifact collected-2" data-collected="alden" type="button" aria-label="Culver City, February 23, 2022">
      <span class="artifact-story">This selfie was taken by my then 4-year-old daughter on 2/23/22. The way the Valentine’s balloon hung above her head was beautiful in a way that I can’t put my finger on. We blew up the photo to nearly five feet, and it hangs in our hallway.</span>
    </button>
    <button class="collected-artifact collected-3" data-collected="chateau" type="button" aria-label="Chateau Marmont, West Hollywood, California, August 17, 2014">
      <img src="assets/images/chateau-marmont.jpg" alt="Illustration of Chateau Marmont" />
      <span class="artifact-plaque"><b>08.17.14</b><em>Chateau Marmont<br>West Hollywood, CA</em></span>
      <span class="artifact-story">The garden was encased in ivy. On Sunset, a few feet away, the city kept moving — you could barely hear it. Something about being there made you feel like you could do anything. And the fries were incredible.</span>
    </button>
    <button class="collected-artifact collected-4" data-collected="petros" type="button" aria-label="Chania, Crete, July 17, 2026">
      <img src="assets/images/petros-chania.jpg" alt="Stone window in Chania, Crete" />
      <span class="artifact-plaque"><b>07.17.26</b><em>Chania, Crete</em></span>
      <span class="artifact-story">While reflecting on the blockade of an Israeli cruise ship in 2025, Petros said, “Let them eat.”</span>
    </button>
    <button class="collected-artifact collected-5" data-collected="pereira" type="button" aria-label="Pereira, Colombia, January 28, 2008">
      <img src="assets/images/pereira-colombia.jpg" alt="Coffee farm worker near Pereira, Colombia" />
      <span class="artifact-plaque"><b>01.28.08</b><em>Pereira, Colombia</em></span>
      <span class="artifact-story">“There is nothing equivalent to the profound sadness of a life ended that’s been lived wasted.” That was the loose interpretation spoken by this farm worker while on a plantation tour in the outskirts of Pereira, Colombia. We were talking about the lifecycles of coffee beans. Reflection is a funny thing. You can see it everywhere when you’re looking.</span>
    </button>
    <button class="collected-artifact collected-6" data-collected="tokyo" type="button" aria-label="Ryoguku Kokugikan, Tokyo, Japan, November 17, 2009">
      <img src="assets/images/tokyo-sumo.jpg" alt="Three sumo wrestlers seated outside Ryoguku Kokugikan" />
      <span class="artifact-plaque"><b>11.17.09</b><em>Ryoguku Kokugikan<br>Tokyo, Japan</em></span>
      <span class="artifact-story">I visited Tokyo on a whim back when there would be weekly sale fares. I spent the morning in Tsukiji Market before attending a sumo competition in the afternoon.</span>
    </button>
